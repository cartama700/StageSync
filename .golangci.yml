version: "2"
run:
  go: "1.26"
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - nilerr
    - nolintlint
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    gocritic:
      disabled-checks:
        - ifElseChain
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
          disabled: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
    paths:
      - api/proto/roompb
      - internal/persistence/mysql/gen
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - api/proto/roompb
      - internal/persistence/mysql/gen
      - third_party$
      - builtin$
      - examples$
